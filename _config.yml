# Site settings
title: gaoyan blog
SEOTitle: gaoyan blog
header-img: img/home-bg.png
email: gaoyanami@gmail.com
description: ""
keyword: ""
url: "http://gaoyanami.github.io"              # your host, for absolute URL
baseurl: ""
author: "gaoyan"



# SNS settings
#RSS: true
weibo_username:    NotBeNamed
zhihu_username:     gaoyan
github_username:    gaoyanami
twitter_username:   gaoyanami
facebook_username:  gaoyan



# Build settings
# from 2016, 'pygments' is unsupported on GitHub Pages. Use 'rouge' for highlighting instead.
highlighter: rouge
permalink: pretty
archive_path: archives
paginate: 10
exclude: ["less","node_modules","Gruntfile.js","package.json","README.md"]
anchorjs: true                          # if you want to customize anchor. check out line:181 of `post.html`



# Gems
# from PR#40, to support local preview for Jekyll 3.0
gems:
  - jekyll-paginate
  - jekyll-feed



# Markdown settings
# replace redcarpet to kramdown,
# although redcarpet can auto highlight code, the lack of header-id make the catalog impossible, so I switch to kramdown
# document: http://jekyllrb.com/docs/configuration/#kramdown
markdown: kramdown
kramdown:
  input: GFM                            # use Github Flavored Markdown !important



# Disqus settings
disqus_username: gaoyanami


# Analytics settings
# Baidu Analytics
#ba_track_id: ca24cc0fb86c19c1a88f5f7a020629d3
# Google Analytics
#ga_track_id: 'UA-49627206-1'            # Format: UA-xxxxxx-xx
#ga_domain: huangxuan.me



# Sidebar settings
sidebar: true                           # whether or not using Sidebar.
sidebar-about-description: ""
sidebar-avatar: /img/avatar-gaoyan.png      # use absolute URL, seeing it's used in both `/` and `/about/`



# Featured Tags
featured-tags: true                     # whether or not using Feature-Tags
featured-condition-size: 1              # A tag will be featured if the size of it is more than this condition value



